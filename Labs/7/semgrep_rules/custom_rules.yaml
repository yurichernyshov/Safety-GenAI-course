rules:
  # =========================================================
  # SQL Injection Detection
  # =========================================================
  - id: python-sql-injection-f-string
    patterns:
      - pattern: $FUNC(f"...", {...}...)
      - metavariable-regex:
          metavariable: $FUNC
          regex: (execute|query|cursor)
    message: "Возможная SQL Injection через f-string"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-89: SQL Injection"
      owasp: "A03:2021-Injection"
  - id: python-sql-injection-format
    patterns:
      - pattern: $CONN.execute("..." % $VAR)
    message: "SQL Injection через форматирование строки %"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-89"

  - id: python-sql-injection-concat
    patterns:
      - pattern: $CONN.execute("..." + $VAR + "...")
    message: "SQL Injection через конкатенацию строк"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-89"

  # =========================================================
  # Command Injection Detection
  # =========================================================
  - id: python-command-injection-os-system
    patterns:
      - pattern: os.system($CMD)
      - pattern-not: os.system("...")
    message: "Command Injection через os.system() с переменными"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-78: OS Command Injection"
      owasp: "A03:2021-Injection"

  - id: python-command-injection-subprocess-shell
    patterns:
      - pattern: subprocess.$FUNC(..., shell=True, ...)
      - pattern-not: subprocess.$FUNC("...", shell=True, ...)
    message: "Command Injection через subprocess с shell=True"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-78"

  # =========================================================
  # Hardcoded Secrets Detection
  # =========================================================
  - id: python-hardcoded-password
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|token|api_key|apikey)
    message: "Hardcoded secret в коде"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021-Identification and Authentication Failures"

  - id: python-hardcoded-api-key
    patterns:
      - pattern: $VAR = "sk-..."
    message: "Hardcoded API key (возможно ключ OpenAI или аналогичный)"
    severity: ERROR
    languages: [python]

  # =========================================================
  # Weak Cryptography Detection
  # =========================================================
  - id: python-weak-hash-md5
    patterns:
      - pattern: hashlib.md5(...)
    message: "Использование слабого хеш-алгоритма MD5"
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-328: Use of Weak Hash"
      owasp: "A02:2021-Cryptographic Failures"

  - id: python-weak-hash-sha1
    patterns:
      - pattern: hashlib.sha1(...)
    message: "Использование слабого хеш-алгоритма SHA1"
    severity: WARNING
    languages: [python]

  - id: python-weak-random
    patterns:
      - pattern: random.$FUNC(...)
      - pattern-inside: |
          def $FUNC(...):
            ...
      - metavariable-regex:
          metavariable: $FUNC
          regex: (random|choice|randint|randrange)
    message: "Использование weak RNG для криптографических целей"
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-330: Use of Insufficiently Random Values"

  # =========================================================
  # Insecure Deserialization Detection
  # =========================================================
  - id: python-insecure-deserialization-pickle
    patterns:
      - pattern: pickle.loads($DATA)
    message: "Insecure Deserialization через pickle"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021-Software and Data Integrity Failures"

  # =========================================================
  # Code Injection Detection
  # =========================================================
  - id: python-code-injection-eval
    patterns:
      - pattern: eval($INPUT)
      - pattern-not: eval("...")
    message: "Code Injection через eval() с переменными"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-95: Improper Neutralization of Directives"
      owasp: "A03:2021-Injection"

  - id: python-code-injection-exec
    patterns:
      - pattern: exec($INPUT)
      - pattern-not: exec("...")
    message: "Code Injection через exec() с переменными"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-95"

  # =========================================================
  # Security Configuration Detection
  # =========================================================
  - id: python-debug-mode-enabled
    patterns:
      - pattern: $APP.run(..., debug=True, ...)
    message: "Debug mode включён в production"
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-489: Active Debug Code"

  - id: python-flask-all-hosts
    patterns:
      - pattern: $APP.run(..., host='0.0.0.0', ...)
    message: "Flask приложение слушает все интерфейсы"
    severity: WARNING
    languages: [python]

  # =========================================================
  # Path Traversal Detection
  # =========================================================
  - id: python-path-traversal-open
    patterns:
      - pattern: open($PATH, ...)
      - pattern-not: open("...", ...)
      - pattern-not-inside: |
          with open("...", ...) as f:
            ...
    message: "Возможный Path Traversal"
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-22: Path Traversal"
      owasp: "A01:2021-Broken Access Control"
